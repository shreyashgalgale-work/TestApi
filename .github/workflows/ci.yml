name: .NET CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --configuration Release --verbosity normal

    - name: Debug structure
      run: ls -R
      
    - name: Build Docker image
      run: |
        cd TestApi/TestApi
        docker build -t testapi:latest .

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to AWS VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/TestApi
          git pull origin main
          docker build -t testapi:latest -f TestApi/TestApi/Dockerfile .

          docker rm -f testapi || true
          docker run -d --name testapi -p 8080:8080 --restart unless-stopped testapi:latest
